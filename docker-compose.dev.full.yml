version: "3.8"
services:
  redis:
    image: "redis:7.2"
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # For local development we want live reload; override command to enable reload
    command:
      [
        "uvicorn",
        "main:app",
        "--app-dir",
        "backend",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    environment:
      - DATABASE_URL=sqlite:////app/dev.db
      - DEBUG=True
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=super-secret-key
    volumes:
      - ./backend:/app:rw
      - ./:/workspace:rw
      - ./logs:/app/logs:rw
      # - ./backend/dev.db:/app/dev.db:rw
      - ./backend/static/uploads:/app/static/uploads:rw
    user: root
    ports:
      - "8100:8000"
    depends_on:
      - redis

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm ci --silent && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - VITE_ASSETS_BASE_URL=/
    volumes:
      - ./frontend:/app:rw
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

networks:
  default:
    name: ecommerce_dev_net
volumes:
  frontend_node_modules:
  backend_static_uploads:
