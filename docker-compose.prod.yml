version: "3.8"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.production
    restart: always
    expose:
      - "8000"
    depends_on:
      - db
      - redis
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request,sys; resp = urllib.request.urlopen(''http://127.0.0.1:8000/health''); sys.exit(0 if resp.getcode()==200 else 1)"',
        ]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8000
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/loadbalancer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env.production
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    # Do not expose redis to the host in production; keep it internal
    expose:
      - "6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
networks:
  default:
    name: ecommerce_prod_net
